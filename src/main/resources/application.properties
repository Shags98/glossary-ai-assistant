spring.application.name=glossary-ai-assistant

# PostgreSQL - matches the momentum-db pattern used in the Glossary API project
spring.datasource.url=jdbc:postgresql://localhost:5434/glossary_ai_db
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Groq API (OpenAI-compatible, free tier) - leave blank to run in mock mode
groq.api.key=${GROQ_API_KEY:}
groq.api.model=llama-3.3-70b-versatile

server.port=8080
